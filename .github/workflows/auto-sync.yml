name: Bi-Directional Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_AIO_AI }}

      - name: Configure Git
        run: |
          git config user.name "🤖 Auto-Sync"
          git config user.email "sync@actions.github.com"

      - name: Setup HF Remote
        run: |
          git remote add hf https://x-access-token:${{ secrets.HF_TOKEN_ALL_REPOS }}@huggingface.co/spaces/Kostya-Lolinger/AIO_AI 2>/dev/null || true
          git remote -v

      - name: Bi-Directional Sync
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Starting Bi-Directional Sync"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          echo "📥 Fetching from HuggingFace..."
          git fetch hf main 2>/dev/null || echo "⚠️  Fetch warning (might be first run)"
          
          if git rev-parse hf/main >/dev/null 2>&1; then
            if ! git diff --quiet HEAD hf/main; then
              echo "📥 HF has updates! Merging (theirs on conflict)..."
              git merge hf/main \
                --no-edit \
                --allow-unrelated-histories \
                -X theirs \
                -m "Sync from HF [$(date '+%Y-%m-%d %H:%M')]" || {
                  echo "⚠️ Merge hatte Konflikte – trotzdem weitermachen"
                  git merge --continue || true
                }
              git push origin main || echo "⚠️ Push zu origin fehlgeschlagen"
              echo "✅ HF → GitHub: Synced"
            else
              echo "ℹ️  HF → GitHub: No changes"
            fi
          fi
          
          echo "📤 Pushing to HuggingFace..."
          git push hf main && echo "✅ GitHub → HF: Synced" \
            || echo "⚠️  GitHub → HF: Push failed (might be already up-to-date)"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Sync Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
