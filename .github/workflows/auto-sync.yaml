jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub CLI
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir huggingface_hub[cli]

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_ALL_REPOS }}
        run: python -m huggingface_hub login --token "$HF_TOKEN" --add-git-credential=false

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m huggingface_hub repo-files \
            --repo-type space \
            --repo-id Kostya-Lolinger/AIO_AI \
            upload \
            --revision main \
            --delete-repo-files \
            --commit-message "Auto-sync from GitHub @ ${{ github.sha }}" \
            . .
