name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and activate virtual environment
        run: |
          python -m venv hf-venv
          source hf-venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install Hugging Face Hub in venv
        run: |
          source hf-venv/bin/activate
          pip install --no-cache-dir huggingface_hub[cli]

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_ALL_REPOS }}
        run: |
          source hf-venv/bin/activate
          huggingface-cli login --token "$HF_TOKEN" --add-to-git-credential=false

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_ALL_REPOS }}
        run: |
          source hf-venv/bin/activate
          huggingface-cli repo-files \
            --repo-type space \
            --repo-id Kostya-Lolinger/AIO_AI \
            upload \
            --revision main \
            --delete-repo-files \
            --commit-message "Auto-sync from GitHub @ ${{ github.sha }}" \
            . .
